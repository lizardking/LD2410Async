name: LD2410Async Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:   # allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        board:
          - esp32:esp32:esp32        # ESP32 Dev Module
          - esp32:esp32:esp32s3      # ESP32-S3 Dev Module
          - esp32:esp32:esp32c3      # ESP32-C3 Dev Module

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # Install Arduino CLI (pinned version for stability)
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v1
        with:
          version: 0.35.3

      # Install ESP32 core
      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      # Build all example sketches
      - name: Compile examples
        run: |
          for sketch in $(find ./examples -name '*.ino'); do
            echo "Compiling $sketch for ${{ matrix.board }}"
            arduino-cli compile --fqbn ${{ matrix.board }} $sketch
          done
